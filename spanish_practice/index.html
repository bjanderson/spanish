<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spanish Practice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3248;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --accent: #10b981;
    --accent-hover: #059669;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --correct: #10b981;
    --incorrect: #ef4444;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Top Bar ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 0.75rem; }

  /* ── Tabs ── */
  .tabs { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
  .tab-btn {
    padding: 0.35rem 1rem; border: none; background: transparent; color: var(--text-muted);
    border-radius: 6px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--primary); color: #fff; }
  .tab-btn:not(.active):hover { color: var(--text); }

  /* ── Buttons ── */
  .btn {
    padding: 0.4rem 0.9rem; border: none; border-radius: 7px; cursor: pointer;
    font-size: 0.8125rem; font-weight: 500; transition: background 0.15s, transform 0.1s;
    display: inline-flex; align-items: center; gap: 0.4rem; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
  .btn-lg { padding: 0.6rem 1.5rem; font-size: 1rem; }
  .btn-icon { padding: 0.25rem 0.5rem; font-size: 0.9rem; }

  /* ── Main ── */
  main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  .view { width: 100%; max-width: 720px; display: none; }
  .view.active { display: flex; flex-direction: column; gap: 1.25rem; }

  /* ── Practice controls row ── */
  .practice-controls {
    display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap;
  }
  .ctrl-wrap { display: flex; align-items: center; gap: 0.5rem; }
  .ctrl-wrap label { font-size: 0.8125rem; color: var(--text-muted); white-space: nowrap; }

  select {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 0.35rem 0.75rem; font-size: 0.875rem; font-family: inherit;
    cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--primary); }

  /* lang toggle reuses .tabs / .tab-btn */

  .practice-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.8125rem; color: var(--text-muted);
  }
  .progress-bar-wrap { flex: 1; margin: 0 1rem; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 99px; transition: width 0.4s ease; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem;
  }
  .direction-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  .prompt-text { font-size: 1.75rem; font-weight: 600; color: var(--text); line-height: 1.3; word-break: break-word; }
  .divider { border: none; border-top: 1px solid var(--border); }

  .answer-area label { display: block; font-size: 0.8125rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-size: 1.1rem; padding: 0.75rem 1rem; resize: vertical;
    min-height: 90px; font-family: inherit; transition: border-color 0.15s; outline: none;
  }
  textarea:focus { border-color: var(--primary); }
  textarea::placeholder { color: var(--text-dim); }

  .card-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

  .feedback {
    border-radius: var(--radius); padding: 1rem 1.25rem; font-size: 0.9375rem;
    display: none; flex-direction: column; gap: 0.5rem; border: 1px solid transparent;
  }
  .feedback.show { display: flex; }
  .feedback.correct { background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); color: var(--correct); }
  .feedback.incorrect { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.25); color: var(--incorrect); }
  .feedback .feedback-label { font-weight: 700; font-size: 1rem; }
  .feedback .feedback-answer { color: var(--text); font-size: 0.9375rem; }
  .feedback .feedback-sub { font-size: 0.8125rem; opacity: 0.75; }

  .state-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 3rem 2rem; text-align: center; display: flex; flex-direction: column;
    align-items: center; gap: 1rem;
  }
  .state-card .state-icon { font-size: 3rem; }
  .state-card h2 { font-size: 1.5rem; font-weight: 700; }
  .state-card p { color: var(--text-muted); max-width: 380px; line-height: 1.6; }

  /* ── Manage ── */
  .manage-header { display: flex; justify-content: space-between; align-items: center; }
  .manage-header h2 { font-size: 1.1rem; font-weight: 600; }

  .form-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem;
  }
  .form-card h3 { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .field { display: flex; flex-direction: column; gap: 0.35rem; }
  .field label { font-size: 0.8125rem; color: var(--text-muted); }
  .field input {
    background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-size: 0.9375rem; padding: 0.55rem 0.9rem; font-family: inherit; outline: none;
    transition: border-color 0.15s; width: 100%;
  }
  .field input:focus { border-color: var(--primary); }
  .field input::placeholder { color: var(--text-dim); }
  .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

  /* ── Group Section ── */
  .group-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
  }
  .group-header {
    display: flex; align-items: center; padding: 0.85rem 1.1rem; gap: 0.75rem;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .group-collapse-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 0.75rem; padding: 0.15rem 0.3rem; transition: transform 0.2s; flex-shrink: 0;
  }
  .group-collapse-btn.open { transform: rotate(90deg); }
  .group-name-display { flex: 1; font-weight: 600; font-size: 0.9375rem; min-width: 0; }
  .group-name-input {
    flex: 1; background: var(--bg); border: 1px solid var(--primary); border-radius: 6px;
    color: var(--text); font-size: 0.9375rem; padding: 0.3rem 0.6rem; font-family: inherit;
    outline: none; display: none;
  }
  .group-count { font-size: 0.75rem; color: var(--text-dim); flex-shrink: 0; }
  .group-header-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

  .group-body { padding: 0; }
  .group-body.collapsed { display: none; }

  /* ── Entry rows ── */
  .entry-row {
    display: flex; align-items: center; padding: 0.7rem 1.1rem; gap: 0.75rem;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .entry-row:last-child { border-bottom: none; }
  .entry-row:hover { background: rgba(255,255,255,0.02); }
  .entry-row.editing { background: rgba(59,130,246,0.06); }

  .entry-texts { flex: 1; min-width: 0; display: flex; gap: 1rem; }
  .entry-col { flex: 1; min-width: 0; }
  .entry-lang { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1px; }
  .entry-val { font-size: 0.875rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .entry-edit-fields { flex: 1; display: none; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .entry-edit-fields input {
    flex: 1; min-width: 100px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.875rem; padding: 0.35rem 0.6rem;
    font-family: inherit; outline: none;
  }
  .entry-edit-fields input:focus { border-color: var(--primary); }
  .entry-edit-fields select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: 0.8rem; padding: 0.35rem 0.5rem; font-family: inherit;
    outline: none; flex-shrink: 0;
  }
  .entry-edit-fields select:focus { border-color: var(--primary); }

  .entry-actions { display: flex; gap: 0.35rem; flex-shrink: 0; }

  .add-entry-row {
    padding: 0.75rem 1.1rem; border-top: 1px solid var(--border);
    display: flex; gap: 0.5rem; align-items: center;
  }
  .add-entry-row input {
    flex: 1; min-width: 80px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.875rem; padding: 0.4rem 0.7rem;
    font-family: inherit; outline: none;
  }
  .add-entry-row input:focus { border-color: var(--primary); }
  .add-entry-row input::placeholder { color: var(--text-dim); }

  .empty-entries { padding: 1.25rem; text-align: center; color: var(--text-dim); font-size: 0.875rem; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(4rem);
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    padding: 0.6rem 1.25rem; border-radius: 99px; font-size: 0.875rem;
    pointer-events: none; transition: transform 0.25s ease, opacity 0.25s ease;
    opacity: 0; z-index: 100; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  #fileInput { display: none; }

  /* ── Error Modal ── */
  .error-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; align-items: center; justify-content: center; padding: 1rem;
  }
  .error-overlay.show { display: flex; }
  .error-modal {
    background: var(--surface); border: 1px solid var(--danger); border-radius: var(--radius);
    padding: 1.75rem; max-width: 420px; width: 100%; display: flex; flex-direction: column; gap: 1rem;
  }
  .error-modal h3 { color: var(--danger); font-size: 1rem; font-weight: 700; }
  .error-modal p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.55; }
  .error-modal-actions { display: flex; justify-content: flex-end; }
</style>
</head>
<body>

<header>
  <div class="logo">Spanish<span>Practice</span></div>
  <div class="tabs">
    <button class="tab-btn active" data-view="practice">Practice</button>
    <button class="tab-btn" data-view="manage">Manage</button>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" id="loadBtn">⬆ Load</button>
    <button class="btn btn-ghost" id="saveBtn">⬇ Save</button>
    <button class="btn btn-ghost" id="ankiBtn">Anki</button>
    <button class="btn btn-danger btn-sm" id="clearBtn">Clear</button>
    <input type="file" id="fileInput" accept=".json">
  </div>
</header>

<main>
  <!-- ── Practice View ── -->
  <div class="view active" id="view-practice">

    <div class="practice-controls">
      <div class="ctrl-wrap">
        <label for="groupSelect">Group:</label>
        <select id="groupSelect">
          <option value="all">All Groups</option>
        </select>
      </div>
      <div class="ctrl-wrap">
        <label>Present in:</label>
        <div class="tabs" id="langToggle">
          <button class="tab-btn active" data-lang="english">English</button>
          <button class="tab-btn" data-lang="spanish">Spanish</button>
        </div>
      </div>
    </div>

    <div class="practice-meta">
      <span id="cycleRemaining">0 remaining</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span id="cycleTotal">0 total</span>
    </div>

    <div id="practiceCard" class="card" style="display:none;">
      <div>
        <div class="direction-label" id="directionLabel">Translate to Spanish</div>
        <div class="prompt-text" id="promptText">—</div>
      </div>
      <hr class="divider">
      <div class="answer-area">
        <label for="answerInput">Your translation</label>
        <textarea id="answerInput" placeholder="Type your answer here…" rows="3"></textarea>
      </div>
      <div id="feedback" class="feedback">
        <div class="feedback-label" id="feedbackLabel"></div>
        <div class="feedback-answer" id="feedbackAnswer"></div>
        <div class="feedback-sub" id="feedbackSub"></div>
      </div>
      <div class="card-actions">
        <button class="btn btn-ghost" id="skipBtn">Skip</button>
        <button class="btn btn-primary btn-lg" id="checkBtn">Check</button>
        <button class="btn btn-accent btn-lg" id="nextBtn" style="display:none;">Next →</button>
      </div>
    </div>

    <div id="emptyState" class="state-card" style="display:none;">
      <div class="state-icon">📚</div>
      <h2>No entries yet</h2>
      <p>Go to the <strong>Manage</strong> tab to create a group and add entries.</p>
      <button class="btn btn-primary btn-lg" data-view="manage">Go to Manage</button>
    </div>

    <div id="completeState" class="state-card" style="display:none;">
      <div class="state-icon">🎉</div>
      <h2>You got them all!</h2>
      <p>Every entry was answered correctly. Start a new round?</p>
      <button class="btn btn-accent btn-lg" id="restartBtn">Start Over</button>
    </div>

  </div>

  <!-- ── Manage View ── -->
  <div class="view" id="view-manage">

    <div class="manage-header">
      <h2>Groups</h2>
      <button class="btn btn-primary" id="showAddGroupBtn">+ Add Group</button>
    </div>

    <div class="form-card" id="addGroupForm" style="display:none;">
      <h3>New Group</h3>
      <div class="field">
        <label for="newGroupName">Group name</label>
        <input type="text" id="newGroupName" placeholder="e.g. Greetings">
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="cancelAddGroupBtn">Cancel</button>
        <button class="btn btn-accent" id="confirmAddGroupBtn">Create Group</button>
      </div>
    </div>

    <div id="groupList"></div>

  </div>
</main>

<div class="error-overlay" id="errorOverlay">
  <div class="error-modal">
    <h3>Import Error</h3>
    <p id="errorMessage"></p>
    <div class="error-modal-actions">
      <button class="btn btn-ghost" id="dismissErrorBtn">Dismiss</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let groups = [];
// [{name: string, entries: [{english, spanish}]}]

let practiceGroupIdx = 'all'; // 'all' or number
let presentationLang = 'english'; // 'english' | 'spanish'
let cycle = [];     // [{g, e}]
let current = null; // {g, e}
let answered = false;
let autoAdvanceTimer = null;
let autoAdvanceInterval = null;

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}


function isDuplicate(entries, spanish, english) {
  return entries.some(e => e.spanish === spanish && e.english === english);
}

function isCompleteSentence(s) {
  return /[.!?]$/.test(s.trim());
}

function stripParens(s) {
  return s.replace(/\s*\([^)]*\)/g, '').trim();
}

function checkMatch(userAnswer, correct) {
  const u = stripParens(userAnswer.trim());
  const c = stripParens(correct.trim());
  if (isCompleteSentence(c)) {
    return u === c;
  }
  const strip = s => s.toLowerCase().replace(/[¡!¿?.,:;'"()\-]/g, '').replace(/\s+/g, ' ').trim();
  return strip(u) === strip(c);
}

function totalEntries() {
  return groups.reduce((n, g) => n + g.entries.length, 0);
}

// ─────────────────────────────────────────────
// Persistence
// ─────────────────────────────────────────────
const STORAGE_KEY = 'spanish-practice-data';

function buildJSON() {
  return JSON.stringify({ groups }, null, 2);
}

function saveToStorage() {
  try { localStorage.setItem(STORAGE_KEY, buildJSON()); } catch(e) {}
}

function sortGroups() {
  groups.sort((a, b) => a.name.localeCompare(b.name));
}

function loadFromObject(obj, silent = false) {
  if (!obj || !Array.isArray(obj.groups)) {
    if (!silent) showError('Expected a JSON file with a "groups" array. No data was imported.');
    return false;
  }

  let addedGroups = 0;
  let addedEntries = 0;

  for (const incoming of obj.groups) {
    if (typeof incoming.name !== 'string' || !Array.isArray(incoming.entries)) continue;
    const validEntries = incoming.entries.filter(
      e => typeof e.english === 'string' && typeof e.spanish === 'string'
    );
    const existing = groups.find(g => g.name === incoming.name);
    if (existing) {
      const deduped = validEntries.filter(e => !isDuplicate(existing.entries, e.spanish, e.english));
      existing.entries.push(...deduped);
      addedEntries += deduped.length;
    } else {
      groups.push({ name: incoming.name, entries: validEntries });
      addedGroups++;
      addedEntries += validEntries.length;
    }
  }

  sortGroups();
  saveToStorage();
  resetCycle();
  renderGroupSelect();
  renderManage();
  renderPractice();
  if (!silent) showToast(`Imported ${addedGroups} new group(s), ${addedEntries} entries`);
  return true;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const blob = new Blob([buildJSON()], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spanish-practice.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Data saved');
});

document.getElementById('loadBtn').addEventListener('click', () => document.getElementById('fileInput').click());

document.getElementById('ankiBtn').addEventListener('click', () => {
  if (groups.length === 0) { showToast('No data to export'); return; }
  const lines = ['#separator:Tab', '#html:false', '#notetype:Basic', '#deck:Spanish Practice', '#columns:Front\tBack\tTags'];
  groups.forEach(g => {
    const tag = g.name.replace(/\s+/g, '_');
    g.entries.forEach(e => {
      lines.push(`${e.english}\t${e.spanish}\t${tag}`);
    });
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spanish-anki.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Anki file exported');
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { loadFromObject(JSON.parse(ev.target.result)); } catch { showError('Could not parse the file as JSON. Make sure the file is valid JSON.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ─────────────────────────────────────────────
// Tab navigation
// ─────────────────────────────────────────────
document.querySelectorAll('[data-view]').forEach(el => {
  el.addEventListener('click', () => switchView(el.dataset.view));
});

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'practice') renderPractice();
  if (name === 'manage') renderManage();
}

// ─────────────────────────────────────────────
// Language toggle
// ─────────────────────────────────────────────
document.getElementById('langToggle').addEventListener('click', e => {
  const btn = e.target.closest('[data-lang]');
  if (!btn) return;
  const lang = btn.dataset.lang;
  if (lang === presentationLang) return;
  presentationLang = lang;
  document.querySelectorAll('#langToggle .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  resetCycle();
  renderPractice();
});

// ─────────────────────────────────────────────
// Group selector (practice)
// ─────────────────────────────────────────────
function renderGroupSelect() {
  const sel = document.getElementById('groupSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="all">All Groups</option>';
  groups.forEach((g, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = g.name;
    sel.appendChild(opt);
  });
  if (prev === 'all' || (prev !== 'all' && groups[parseInt(prev)])) {
    sel.value = prev;
    practiceGroupIdx = prev === 'all' ? 'all' : parseInt(prev);
  } else {
    sel.value = 'all';
    practiceGroupIdx = 'all';
  }
}

document.getElementById('groupSelect').addEventListener('change', e => {
  practiceGroupIdx = e.target.value === 'all' ? 'all' : parseInt(e.target.value);
  resetCycle();
  renderPractice();
});

// ─────────────────────────────────────────────
// Cycle logic
// ─────────────────────────────────────────────
function buildCycleItems() {
  const items = [];
  if (practiceGroupIdx === 'all') {
    groups.forEach((g, gi) => g.entries.forEach((_, ei) => items.push({ g: gi, e: ei })));
  } else {
    const g = groups[practiceGroupIdx];
    if (g) g.entries.forEach((_, ei) => items.push({ g: practiceGroupIdx, e: ei }));
  }
  return items;
}

function resetCycle() {
  cycle = shuffle(buildCycleItems());
  current = null;
  answered = false;
  clearAutoAdvance();
}

function pickNext() {
  if (cycle.length === 0) return null;
  return { ...cycle[Math.floor(Math.random() * cycle.length)] };
}

function removeFromCycle(g, e) {
  const idx = cycle.findIndex(c => c.g === g && c.e === e);
  if (idx !== -1) cycle.splice(idx, 1);
}

// ─────────────────────────────────────────────
// Practice rendering
// ─────────────────────────────────────────────
const practiceCard   = document.getElementById('practiceCard');
const emptyState     = document.getElementById('emptyState');
const completeState  = document.getElementById('completeState');
const progressFill   = document.getElementById('progressFill');
const directionLabel = document.getElementById('directionLabel');
const promptText     = document.getElementById('promptText');
const answerInput    = document.getElementById('answerInput');
const feedback       = document.getElementById('feedback');
const feedbackLabel  = document.getElementById('feedbackLabel');
const feedbackAnswer = document.getElementById('feedbackAnswer');
const feedbackSub    = document.getElementById('feedbackSub');
const checkBtn       = document.getElementById('checkBtn');
const nextBtn        = document.getElementById('nextBtn');
const skipBtn        = document.getElementById('skipBtn');

function renderPractice() {
  const total = buildCycleItems().length;

  if (total === 0) {
    practiceCard.style.display = 'none';
    emptyState.style.display = 'flex';
    completeState.style.display = 'none';
    updateProgress(0, 0);
    return;
  }

  emptyState.style.display = 'none';

  if (cycle.length === 0 && !current) {
    practiceCard.style.display = 'none';
    completeState.style.display = 'flex';
    updateProgress(total, total);
    return;
  }

  completeState.style.display = 'none';
  practiceCard.style.display = 'flex';
  if (!current) { current = pickNext(); answered = false; }
  showCurrentCard();
}

function showCurrentCard() {
  const total = buildCycleItems().length;
  const entry = groups[current.g]?.entries[current.e];
  if (!entry) { advanceToNext(); return; }

  const presentingEnglish = presentationLang === 'english';
  directionLabel.textContent = presentingEnglish ? 'Translate to Spanish' : 'Translate to English';
  promptText.textContent = presentingEnglish ? entry.english : entry.spanish;

  answerInput.value = '';
  answerInput.disabled = false;
  hideFeedback();
  checkBtn.style.display = '';
  nextBtn.style.display = 'none';
  skipBtn.style.display = '';
  answerInput.focus();

  updateProgress(total - cycle.length, total);
}

function updateProgress(done, total) {
  progressFill.style.width = (total === 0 ? 0 : (done / total) * 100) + '%';
  document.getElementById('cycleRemaining').textContent = `${cycle.length} remaining`;
  document.getElementById('cycleTotal').textContent = `${total} total`;
}

function checkAnswer() {
  if (answered) return;
  const entry = groups[current.g]?.entries[current.e];
  if (!entry) return;
  const userAnswer = answerInput.value.trim();
  if (!userAnswer) return;

  const presentingEnglish = presentationLang === 'english';
  const correct = presentingEnglish ? entry.spanish : entry.english;
  const isCorrect = checkMatch(userAnswer, correct);

  answered = true;
  answerInput.disabled = true;
  checkBtn.style.display = 'none';
  nextBtn.style.display = '';
  skipBtn.style.display = 'none';

  if (isCorrect) {
    removeFromCycle(current.g, current.e);
    const total = buildCycleItems().length;
    updateProgress(total - cycle.length, total);
    startAutoAdvance();
  } else {
    showFeedback('incorrect', '✗ Not quite', correct, null);
  }
}

function startAutoAdvance() {
  clearAutoAdvance();
  let remaining = 3;
  showFeedback('correct', '✓ Correct!', '', remaining);
  autoAdvanceInterval = setInterval(() => {
    remaining--;
    if (remaining > 0) showFeedback('correct', '✓ Correct!', '', remaining);
  }, 1000);
  autoAdvanceTimer = setTimeout(() => { clearAutoAdvance(); advanceToNext(); }, 3000);
}

function clearAutoAdvance() {
  clearTimeout(autoAdvanceTimer);
  clearInterval(autoAdvanceInterval);
  autoAdvanceTimer = null;
  autoAdvanceInterval = null;
}

function showFeedback(type, label, answer, countdown) {
  feedback.className = 'feedback show ' + type;
  feedbackLabel.textContent = label;
  feedbackAnswer.textContent = answer ? 'Correct answer: ' + answer : '';
  feedbackSub.textContent = countdown != null ? `Next in ${countdown}s… (or press Enter)` : '';
}
function hideFeedback() { feedback.className = 'feedback'; }

function advanceToNext() {
  clearAutoAdvance();
  if (cycle.length === 0) { current = null; renderPractice(); return; }
  current = pickNext();
  answered = false;
  showCurrentCard();
}

checkBtn.addEventListener('click', checkAnswer);
nextBtn.addEventListener('click', advanceToNext);
skipBtn.addEventListener('click', () => { if (!answered) advanceToNext(); });
answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!answered) checkAnswer(); else advanceToNext();
  }
});
document.getElementById('restartBtn').addEventListener('click', () => { resetCycle(); renderPractice(); });

// ─────────────────────────────────────────────
// Manage rendering
// ─────────────────────────────────────────────
function renderManage() {
  const list = document.getElementById('groupList');
  list.innerHTML = '';
  if (groups.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:2rem 0;font-size:.9rem;">No groups yet. Add one above!</div>';
    return;
  }
  groups.forEach((g, gi) => list.appendChild(buildGroupSection(g, gi)));
}

function buildGroupSection(group, gi) {
  const section = document.createElement('div');
  section.className = 'group-section';
  section.dataset.gi = gi;

  const header = document.createElement('div');
  header.className = 'group-header';

  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'group-collapse-btn open';
  collapseBtn.textContent = '▶';

  const nameDisplay = document.createElement('span');
  nameDisplay.className = 'group-name-display';
  nameDisplay.textContent = group.name;

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'group-name-input';
  nameInput.value = group.name;

  const count = document.createElement('span');
  count.className = 'group-count';
  count.textContent = `${group.entries.length} entries`;

  const actions = document.createElement('div');
  actions.className = 'group-header-actions';

  const editBtn = document.createElement('button');
  editBtn.className = 'btn btn-ghost btn-sm';
  editBtn.textContent = 'Edit';

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn btn-danger btn-sm';
  deleteBtn.textContent = 'Delete';

  actions.append(editBtn, deleteBtn);
  header.append(collapseBtn, nameDisplay, nameInput, count, actions);

  const body = document.createElement('div');
  body.className = 'group-body';
  body.appendChild(buildEntryList(group, gi));
  body.appendChild(buildAddEntryRow(gi));

  section.append(header, body);

  collapseBtn.addEventListener('click', () => {
    const open = collapseBtn.classList.toggle('open');
    body.classList.toggle('collapsed', !open);
  });

  editBtn.addEventListener('click', () => {
    const isEditing = section.classList.contains('editing-name');
    if (isEditing) {
      const newName = nameInput.value.trim();
      if (!newName) { showToast('Group name cannot be empty'); return; }
      groups[gi].name = newName;
      sortGroups();
      saveToStorage();
      nameDisplay.textContent = newName;
      section.classList.remove('editing-name');
      nameDisplay.style.display = '';
      nameInput.style.display = 'none';
      editBtn.textContent = 'Edit';
      renderGroupSelect();
      renderManage();
      showToast('Group renamed');
    } else {
      section.classList.add('editing-name');
      nameDisplay.style.display = 'none';
      nameInput.style.display = '';
      nameInput.focus();
      nameInput.select();
      editBtn.textContent = 'Save';
    }
  });

  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') editBtn.click(); });

  deleteBtn.addEventListener('click', () => {
    if (!confirm(`Delete group "${group.name}" and all its entries?`)) return;
    groups.splice(gi, 1);
    cycle = cycle.filter(c => c.g !== gi).map(c => c.g > gi ? { ...c, g: c.g - 1 } : c);
    if (current) {
      if (current.g === gi) { current = null; answered = false; }
      else if (current.g > gi) current.g--;
    }
    if (practiceGroupIdx !== 'all') {
      if (practiceGroupIdx === gi) practiceGroupIdx = 'all';
      else if (practiceGroupIdx > gi) practiceGroupIdx--;
    }
    saveToStorage();
    renderGroupSelect();
    renderManage();
    showToast('Group deleted');
  });

  return section;
}

function buildEntryList(group, gi) {
  const wrap = document.createElement('div');
  if (group.entries.length === 0) {
    wrap.innerHTML = '<div class="empty-entries">No entries yet.</div>';
    return wrap;
  }
  group.entries.forEach((entry, ei) => wrap.appendChild(buildEntryRow(entry, gi, ei)));
  return wrap;
}

function buildEntryRow(entry, gi, ei) {
  const row = document.createElement('div');
  row.className = 'entry-row';

  const texts = document.createElement('div');
  texts.className = 'entry-texts';
  texts.innerHTML = `
    <div class="entry-col">
      <div class="entry-lang">Spanish</div>
      <div class="entry-val">${esc(entry.spanish)}</div>
    </div>
    <div class="entry-col">
      <div class="entry-lang">English</div>
      <div class="entry-val">${esc(entry.english)}</div>
    </div>`;

  const editFields = document.createElement('div');
  editFields.className = 'entry-edit-fields';

  const spanishInput = document.createElement('input');
  spanishInput.type = 'text';
  spanishInput.value = entry.spanish;
  spanishInput.placeholder = 'Spanish';

  const englishInput = document.createElement('input');
  englishInput.type = 'text';
  englishInput.value = entry.english;
  englishInput.placeholder = 'English';

  const moveSelect = document.createElement('select');
  moveSelect.title = 'Move to group';
  buildMoveOptions(moveSelect, gi);

  editFields.append(spanishInput, englishInput, moveSelect);

  const actions = document.createElement('div');
  actions.className = 'entry-actions';

  const editBtn = document.createElement('button');
  editBtn.className = 'btn btn-ghost btn-sm';
  editBtn.textContent = 'Edit';

  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-danger btn-sm btn-icon';
  delBtn.textContent = '✕';
  delBtn.title = 'Delete';

  actions.append(editBtn, delBtn);
  row.append(texts, editFields, actions);

  editBtn.addEventListener('click', () => {
    const isEditing = row.classList.contains('editing');
    if (isEditing) {
      const newSpanish = spanishInput.value.trim();
      const newEnglish = englishInput.value.trim();
      if (!newSpanish || !newEnglish) { showToast('Both fields required'); return; }
      const targetGi = parseInt(moveSelect.value);

      if (targetGi !== gi) {
        if (isDuplicate(groups[targetGi].entries, newSpanish, newEnglish)) { showToast('That entry already exists in the target group'); return; }
        groups[targetGi].entries.push({ spanish: newSpanish, english: newEnglish });
        groups[gi].entries.splice(ei, 1);
        cycle = cycle.filter(c => !(c.g === gi && c.e === ei));
        cycle = cycle.map(c => c.g === gi && c.e > ei ? { ...c, e: c.e - 1 } : c);
        if (current && current.g === gi && current.e === ei) { current = null; answered = false; }
        else if (current && current.g === gi && current.e > ei) current.e--;
        showToast('Entry moved');
      } else {
        const others = groups[gi].entries.filter((_, i) => i !== ei);
        if (isDuplicate(others, newSpanish, newEnglish)) { showToast('That entry already exists in this group'); return; }
        groups[gi].entries[ei] = { spanish: newSpanish, english: newEnglish };
        showToast('Entry saved');
      }
      saveToStorage();
      renderManage();
      renderGroupSelect();
    } else {
      buildMoveOptions(moveSelect, gi);
      row.classList.add('editing');
      texts.style.display = 'none';
      editFields.style.display = 'flex';
      editBtn.textContent = 'Save';
      spanishInput.focus();
    }
  });

  [spanishInput, englishInput].forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') editBtn.click(); });
  });

  delBtn.addEventListener('click', () => {
    groups[gi].entries.splice(ei, 1);
    cycle = cycle.filter(c => !(c.g === gi && c.e === ei));
    cycle = cycle.map(c => c.g === gi && c.e > ei ? { ...c, e: c.e - 1 } : c);
    if (current && current.g === gi && current.e === ei) { current = null; answered = false; }
    else if (current && current.g === gi && current.e > ei) current.e--;
    saveToStorage();
    renderManage();
    showToast('Entry deleted');
  });

  return row;
}

function buildMoveOptions(sel, currentGi) {
  sel.innerHTML = '';
  groups.forEach((g, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = (i === currentGi ? '↩ ' : '→ ') + g.name;
    if (i === currentGi) opt.selected = true;
    sel.appendChild(opt);
  });
}

function buildAddEntryRow(gi) {
  const row = document.createElement('div');
  row.className = 'add-entry-row';

  const spanishIn = document.createElement('input');
  spanishIn.type = 'text';
  spanishIn.placeholder = 'Spanish';

  const englishIn = document.createElement('input');
  englishIn.type = 'text';
  englishIn.placeholder = 'English';

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-accent btn-sm';
  addBtn.textContent = '+ Add';

  row.append(spanishIn, englishIn, addBtn);

  const doAdd = () => {
    const spanish = spanishIn.value.trim();
    const english = englishIn.value.trim();
    if (!spanish || !english) { showToast('Please fill in both fields'); return; }
    if (isDuplicate(groups[gi].entries, spanish, english)) { showToast('That entry already exists in this group'); return; }
    groups[gi].entries.push({ spanish, english });
    cycle.push({ g: gi, e: groups[gi].entries.length - 1 });
    spanishIn.value = '';
    englishIn.value = '';
    saveToStorage();
    renderManage();
    renderGroupSelect();
    showToast('Entry added');
    spanishIn.focus();
  };

  addBtn.addEventListener('click', doAdd);
  [spanishIn, englishIn].forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); }));

  return row;
}

// ── Add Group ──
document.getElementById('showAddGroupBtn').addEventListener('click', () => {
  document.getElementById('addGroupForm').style.display = 'flex';
  document.getElementById('newGroupName').focus();
});
document.getElementById('cancelAddGroupBtn').addEventListener('click', () => {
  document.getElementById('addGroupForm').style.display = 'none';
  document.getElementById('newGroupName').value = '';
});
document.getElementById('confirmAddGroupBtn').addEventListener('click', addGroup);
document.getElementById('newGroupName').addEventListener('keydown', e => { if (e.key === 'Enter') addGroup(); });

function addGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  if (!name) { showToast('Please enter a group name'); return; }
  groups.push({ name, entries: [] });
  sortGroups();
  saveToStorage();
  document.getElementById('newGroupName').value = '';
  document.getElementById('addGroupForm').style.display = 'none';
  renderGroupSelect();
  renderManage();
  showToast(`Group "${name}" created`);
}

// ─────────────────────────────────────────────
// Error modal
// ─────────────────────────────────────────────
function showError(msg) {
  document.getElementById('errorMessage').textContent = msg;
  document.getElementById('errorOverlay').classList.add('show');
}

document.getElementById('dismissErrorBtn').addEventListener('click', () => {
  document.getElementById('errorOverlay').classList.remove('show');
});

// ─────────────────────────────────────────────
// Clear data
// ─────────────────────────────────────────────
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Clear all loaded data? This cannot be undone.')) return;
  groups = [];
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  resetCycle();
  renderGroupSelect();
  renderManage();
  renderPractice();
  showToast('Data cleared');
});
document.getElementById('errorOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
});

// ─────────────────────────────────────────────
// Toast
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────
(async () => {
  let loaded = false;
  try {
    const res = await fetch('spanish-practice.json');
    if (res.ok) {
      const obj = await res.json();
      loaded = loadFromObject(obj, true);
    }
  } catch(e) {}
  if (!loaded) {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) loadFromObject(JSON.parse(stored), true);
    } catch(e) {}
  }
  renderPractice();
})();
</script>
